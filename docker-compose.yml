services:
  postgres:
    image: postgres:16-alpine
    container_name: villawolf-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: villawolf
    ports:
      - "5432:5432"
    volumes:
      - villawolf_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: src/VillaWolf.Api/Dockerfile
    container_name: villawolf-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=villawolf;Username=postgres;Password=postgres"
    ports:
      - "8080:8080"

volumes:
  villawolf_pgdata:
